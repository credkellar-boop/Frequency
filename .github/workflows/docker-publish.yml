name: Build and Push Docker Image

# Triggers the workflow on pushes to the main branch
on:
  push:
    branches:
      - main # Change this to 'master' if that is your default branch name

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx (Recommended for build-push-action)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Authenticate with Docker Hub using repository secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Build the image and push it to your specific Docker Hub repository
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: credkellar/frequency:latest
